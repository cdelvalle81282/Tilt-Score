<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tilt Score</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@75..100,400..800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* ---- Reskin here: swap these to brand colors and everything follows ---- */
  :root {
    --bg: #f4f6f4;
    --panel: #ffffff;
    --ink: #132029;        /* Project Next navy */
    --ink-soft: #5c6a72;
    --accent: #abc74c;     /* Project Next lime */
    --accent-deep: #79912a;
    --rule: #dde3dd;
    --calls: #0e7c66;      /* call side of the bar */
    --calls-soft: #d9efe9;
    --puts: #b3402a;       /* put side of the bar */
    --puts-soft: #f6e3dd;
    --center: #aeb8ae;     /* the 50 line */
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: "Archivo", system-ui, sans-serif;
    padding: clamp(16px, 4vw, 48px);
  }
  .wrap { max-width: 980px; margin: 0 auto; }

  .banner { display: block; width: 100%; height: auto; margin-bottom: 18px; }
  header { display: flex; flex-wrap: wrap; align-items: baseline; gap: 10px 18px; margin-bottom: 8px; }
  h1 {
    font-size: clamp(26px, 4vw, 38px);
    font-weight: 800;
    font-stretch: 78%;
    letter-spacing: -0.01em;
    text-transform: uppercase;
  }
  .stamp { font-family: "IBM Plex Mono", monospace; font-size: 13px; color: var(--ink-soft); }
  .sub { color: var(--ink); font-size: 16.5px; line-height: 1.5; max-width: 62ch; margin-bottom: 22px; }
  .sub b.c { color: var(--calls); } .sub b.p { color: var(--puts); }

  table { width: 100%; border-collapse: collapse; background: var(--panel); }
  th, td { padding: 10px; font-size: 14.5px; }
  thead th {
    font-family: "IBM Plex Mono", monospace; font-size: 12px; font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-soft);
    border-bottom: 2px solid var(--accent); text-align: right; vertical-align: bottom;
    cursor: pointer; user-select: none; white-space: nowrap;
  }
  thead th:first-child, td.sym { text-align: left; }
  th.exp, td.exp { text-align: left; }
  td.exp { color: var(--ink-soft); font-size: 13px; }
  th.scaleth { padding: 6px 4px 7px; cursor: default; }   /* 4px sides = same as td.bar, so the scale sits exactly over the track */
  .scale-words {
    display: flex; justify-content: space-between; margin-bottom: 3px;
    font-family: "Archivo", sans-serif; font-size: 12.5px; font-weight: 800;
    font-stretch: 82%; letter-spacing: 0.04em; text-transform: uppercase;
  }
  .scale-words .pw { color: var(--puts); }
  .scale-words .cw { color: var(--calls); }
  .scale-nums { position: relative; height: 13px; font-size: 11.5px; color: var(--ink-soft); font-weight: 400; letter-spacing: 0; }
  .scale-nums span { position: absolute; top: 0; }
  .scale-nums .n0   { left: 0; }
  .scale-nums .n50  { left: 50%; transform: translateX(-50%); }
  .scale-nums .n100 { right: 0; }
  thead th:hover, thead th.on { color: var(--ink); }
  thead th[data-k]::after { content: " ⇅"; color: var(--rule); }
  thead th[data-k]:hover::after { color: var(--accent-deep); }
  thead th.on::after, thead th.on:hover::after { content: " ▾"; color: var(--accent-deep); }
  thead th.on.asc::after, thead th.on.asc:hover::after { content: " ▴"; color: var(--accent-deep); }
  tbody tr { border-bottom: 1px solid var(--rule); }
  tbody tr:last-child { border-bottom: none; }
  td { font-family: "IBM Plex Mono", monospace; text-align: right; font-variant-numeric: tabular-nums; }
  td.sym { font-family: "Archivo", sans-serif; font-weight: 700; font-size: 15.5px; }
  td.spot span { display: block; font-size: 12.5px; }
  .up { color: var(--calls); } .dn { color: var(--puts); }
  body.no-history .dcol { display: none; }
  td.score { font-weight: 600; font-size: 17px; width: 64px; }
  td.delta { color: var(--ink-soft); font-size: 13.5px; width: 70px; }

  /* Tug-of-war bar: anchored at 50, calls pull right, puts pull left */
  td.bar { width: 34%; min-width: 180px; padding: 9px 4px; }
  .track { position: relative; height: 16px; background: linear-gradient(to right, var(--puts-soft) 0 50%, var(--calls-soft) 50% 100%); }
  .track::before {
    content: ""; position: absolute; left: 50%; top: -3px; bottom: -3px;
    width: 2px; background: var(--center); transform: translateX(-1px);
  }
  .fill { position: absolute; top: 0; bottom: 0; }
  .fill.c { left: 50%; background: var(--calls); }
  .fill.p { right: 50%; background: var(--puts); }

  .note {
    margin-top: 14px; font-family: "IBM Plex Mono", monospace;
    font-size: 13px; color: var(--ink-soft); line-height: 1.6;
  }
  .warn { color: var(--puts); }

  @media (max-width: 700px) {
    .hide-sm { display: none; }
    td.bar { min-width: 120px; }
    th, td { padding: 8px 6px; }
  }
</style>
</head>

const fmt = n => n == null ? "—" : n.toLocaleString("en-US");
const state = { rows: [], key: "tilt", asc: false };

function render() {
  const { rows, key, asc } = state;
  rows.sort((a, b) => {
    const x = a[key] ?? -Infinity, y = b[key] ?? -Infinity;
    if (typeof x === "string") return asc ? x.localeCompare(y) : y.localeCompare(x);
    return asc ? x - y : y - x;
  });
  document.getElementById("rows").innerHTML = rows.map(r => {
    const t = r.tilt ?? 50;
    const dev = Math.abs(t - 50) / 2;               // % width of half-track
    const side = t >= 50 ? "c" : "p";
    const d = (r.tilt != null && r.tilt_prev != null) ? (r.tilt - r.tilt_prev) : null;
    const chg = r.spot_change_pct;
    return `<tr>
      <td class="sym">${r.symbol}</td>
      <td class="exp">${r.expiry ? r.expiry.slice(5).replace("-","/") : "—"}</td>
      <td class="spot hide-sm">${r.spot?.toFixed(2) ?? "—"}<span class="${chg >= 0 ? "up" : "dn"}">${chg == null ? "" : (chg >= 0 ? "+" : "") + chg.toFixed(2) + "%"}</span></td>
      <td class="score" style="color:var(--${t >= 50 ? "calls" : "puts"})">${r.tilt ?? "—"}</td>
      <td class="bar"><div class="track"><div class="fill ${side}" style="width:${dev}%"></div></div></td>
      <td class="delta dcol">${d == null ? "—" : (d >= 0 ? "+" : "") + d.toFixed(1)}</td>
      <td class="hide-sm">${fmt(r.calls)}</td>
      <td class="hide-sm">${fmt(r.puts)}</td>
      <td>${fmt(r.total)}</td>
    </tr>`;
  }).join("");
}

document.querySelectorAll("thead th[data-k]").forEach(th => {
  th.addEventListener("click", () => {
    const k = th.dataset.k;
    state.asc = state.key === k ? !state.asc : false;
    state.key = k;
    document.querySelectorAll("thead th").forEach(x => x.classList.remove("on", "asc"));
    th.classList.add("on");
    if (state.asc) th.classList.add("asc");
    render();
  });
});

function load(data, live) {
  state.rows = data.rows || [];
  const hasHistory = state.rows.some(r => r.tilt_prev != null);
  document.body.classList.toggle("no-history", !hasHistory);
  if (!hasHistory && state.key === "tilt_prev") { state.key = "tilt"; state.asc = false; }
  const ts = new Date(data.generated);
  document.getElementById("stamp").textContent =
    ts.toLocaleString("en-US", { dateStyle: "medium", timeStyle: "short" });
  let note = data.source || "";
  if (!live) note += ' <span class="warn">· showing baked-in snapshot — tilt.json not found next to this page</span>';
  if (data.failed?.length) note += ` <span class="warn">· failed: ${data.failed.join(", ")}</span>`;
  document.getElementById("note").innerHTML = note;
  render();
}

/* Where the page finds its data. "tilt.json" works when this file sits in the
   same repo/folder as the JSON (GitHub Pages). If you paste this HTML into
   wisepub or any other host, point it at the absolute Pages URL instead, e.g.
   const DATA_URL = "https://YOURUSER.github.io/YOURREPO/tilt.json"; */
const DATA_URL = "tilt.json";

fetch(DATA_URL, { cache: "no-store" })
  .then(r => { if (!r.ok) throw 0; return r.json(); })
  .then(d => load(d, true))
  .catch(() => FALLBACK ? load(FALLBACK, false)
    : document.getElementById("stamp").textContent = "no data — run fetch_tilt.py first");
</script>
